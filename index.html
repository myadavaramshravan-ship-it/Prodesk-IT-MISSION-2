<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CASH FLOW</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
  <h1>EXPENSE TRACKER</h1>

  <div class="card">
    <input type="number" id="salary" placeholder="Enter Total Salary">
    <button onclick="setSalary()">Set Salary</button>
    <h3>Total Salary: ₹<span id="salaryDisplay">0</span></h3>
  <hr>

  <div class="card">
    <input type="text" id="expenseName" placeholder="Expense Name">
    <input type="number" id="expenseAmount" placeholder="Expense Amount">
    <button onclick="addExpense()">Add Expense</button>
 <hr>
  <div class="card">
    <h2>Remaining Balance: ₹<span id="balance">0</span></h2>

    <hr>

  <div class="card">
    <h3>Expenses</h3>
    <ul id="expenseList"></ul>
  
<hr>
  <div class="card">
    <canvas id="myChart"></canvas>
     </div>
     <hr>
</div>
</div>
  </div>
  </div>
</div>

<script src="math.js"></script>
</body>
</html>
